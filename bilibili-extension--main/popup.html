<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 520px; min-height: 300px; max-height: 620px;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px; background: #0f0f1a; color: #e0e0e0;
      padding: 16px; overflow-y: auto;
    }
    h1 { font-size: 18px; margin-bottom: 14px; color: #00c8ff; display: flex; align-items: center; gap: 8px; }
    h1 small { font-size: 12px; color: #888; font-weight: normal; }
    .section { margin-bottom: 12px; }
    label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
    input[type="text"], input[type="password"], select {
      width: 100%; padding: 8px 10px; border: 1px solid #333; border-radius: 6px;
      background: #1a1a2e; color: #e0e0e0; font-size: 14px; outline: none; transition: border .2s;
    }
    input:focus, select:focus { border-color: #00c8ff; }
    .row { display: flex; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
    .row label { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; color: #ccc; cursor: pointer; }
    .row input[type="checkbox"] { accent-color: #00c8ff; width: 16px; height: 16px; }
    .row input[type="number"] { width: 70px; padding: 6px 8px; border: 1px solid #333; border-radius: 4px;
      background: #1a1a2e; color: #e0e0e0; font-size: 13px; text-align: center; }
    .row select { width: auto; min-width: 100px; padding: 6px 8px; font-size: 13px; }
    .btn-start {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      background: linear-gradient(135deg, #00c8ff, #0088cc); color: #fff;
      font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity .2s;
    }
    .btn-start:hover { opacity: .85; }
    .btn-start:disabled { opacity: .4; cursor: not-allowed; }
    .btn-cancel {
      width: 100%; padding: 8px; border: 1px solid #555; border-radius: 8px;
      background: transparent; color: #ccc; font-size: 14px; cursor: pointer; margin-top: 6px;
    }
    .btn-cancel:hover { background: #2a2a3e; }
    .log-box {
      background: #0a0a14; border: 1px solid #222; border-radius: 6px;
      padding: 10px; height: 180px; overflow-y: auto; font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-all;
    }
    .log-box .log-progress { color: #888; }
    .log-box .log-success { color: #4caf50; }
    .log-box .log-error { color: #f44336; }
    .log-box .log-info { color: #00c8ff; }
    .download-area { margin-top: 10px; }
    .download-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border: 1px solid #00c8ff; border-radius: 6px;
      background: transparent; color: #00c8ff; font-size: 13px; cursor: pointer;
      margin: 3px; transition: background .2s;
    }
    .download-btn:hover { background: rgba(0,200,255,.15); }
    .hint { font-size: 11px; color: #666; margin-top: 2px; }
    .badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge-dm { background: #2196f3; color: #fff; }
    .badge-cm { background: #ff9800; color: #fff; }
    .badge-sub { background: #9c27b0; color: #fff; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>🔍 B站数据爬取工具 <span style="flex:1"></span> <a id="btn-settings" href="#" title="设置" style="color:#666;text-decoration:none;font-size:18px">⚙️</a></h1>

  <div class="section">
    <label for="bvid">视频链接 / BV 号</label>
    <input type="text" id="bvid" placeholder="BV1xx... 或完整URL（在B站视频页自动识别）" />
    <div class="hint" id="auto-detect-hint"></div>
  </div>

  <div class="section row">
    <label><input type="checkbox" id="chk-danmaku" checked /> <span class="badge badge-dm">弹幕</span></label>
    <label><input type="checkbox" id="chk-comments" /> <span class="badge badge-cm">评论</span></label>
    <label><input type="checkbox" id="chk-subtitle" /> <span class="badge badge-sub">字幕</span></label>
  </div>

  <div class="section row">
    <label><input type="checkbox" id="chk-replies" /> 楼中楼回复</label>
    <label>最大页数: <input type="number" id="max-pages" value="0" min="0" /></label>
  </div>

  <div class="section row">
    <label>字幕语言:
      <select id="sub-lan">
        <option value="ai-zh">中文（AI）</option>
        <option value="zh-Hans">中文（简体）</option>
        <option value="zh-Hant">中文（繁体）</option>
        <option value="en">英语</option>
        <option value="ja">日语</option>
        <option value="ko">韩语</option>
      </select>
    </label>
    <label>导出格式:
      <select id="save-fmt">
        <option value="json">JSON</option>
        <option value="csv">CSV</option>
        <option value="txt">TXT</option>
        <option value="srt">SRT</option>
        <option value="ass">ASS</option>
        <option value="lrc">LRC</option>
      </select>
    </label>
  </div>

  <div class="section">
    <label for="cookie">Cookie（选填，访问私密视频或提高限额）</label>
    <input type="password" id="cookie" placeholder="SESSDATA=xxx; bili_jct=yyy" />
    <div class="hint">留空则只访问公开数据</div>
  </div>

  <button class="btn-start" id="btn-start">🚀 开始爬取</button>
  <button class="btn-cancel" id="btn-cancel" style="display:none">取消</button>

  <div class="section" style="margin-top:12px">
    <label>运行日志</label>
    <div class="log-box" id="log"></div>
  </div>

  <div class="download-area" id="download-area"></div>

  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
